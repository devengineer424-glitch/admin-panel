<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TAG CMS Admin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="loginScreen" class="auth-screen">
        <div class="auth-card">
            <h1 class="auth-title">TAG Admin Login</h1>
            <p class="auth-subtitle">Sign in with your Tags admin account.</p>

            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Admin email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary">Login</button>
                    <button type="button" class="btn" onclick="resetAuthForm()">Reset</button>
                </div>

                <div id="loginStatus" class="status"></div>
            </form>
        </div>
    </div>

    <div id="appShell" class="app-shell hidden">

        <div class="sidebar">

            <h2>TAG CMS</h2>

            <button class="nav-btn active" id="blogNav" onclick="loadBlogs()">Blogs</button>
            <button class="nav-btn" id="caseNav" onclick="loadCases()">Case Studies</button>
            <button class="nav-btn" id="subsNav" onclick="loadSubscribers()">Subscribed Emails</button>
            <button class="nav-btn" id="msgNav" onclick="loadMessages()">Contact Messages</button>
            <button class="nav-btn" onclick="logout()">Logout</button>

        </div>

        <div class="main">

            <div class="header">
                <div class="header-main">
                    <div class="section-title" id="sectionTitle">Blogs</div>
                    <div class="search-bar hidden" id="searchBar">
                        <input type="search" id="searchInput" placeholder="Search blogs..." autocomplete="off">
                        <button type="button" class="btn btn-search-clear" id="clearSearchBtn">Clear</button>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="addBtn" onclick="openCreate()">Add New</button>
                    <button class="btn btn-copy" id="copyEmailsBtn" onclick="copyAllSubscriberEmails()" style="display:none">Copy All Emails</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr id="tableHead"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div id="messagesView" class="messages-view"></div>

        </div>

    </div>

    <div class="modal" id="modal">

        <div class="modal-box">

            <div class="form-title" id="formTitle"></div>

            <form id="dataForm"></form>

            <button type="button" id="saveBtn" class="btn btn-primary" onclick="save(event)">Save</button>
            <button type="button" class="btn" onclick="closeModal()">Cancel</button>

            <div id="status" class="status"></div>

        </div>

    </div>

    <!-- Load modules in order: constants first, then auth/api/utils/ui, then features, then main -->
    <script src="constants.js"></script>

    <!-- Core modules -->
    <script src="auth.js"></script>
    <script src="api.js"></script>
    <script src="utils.js"></script>
    <script src="ui.js"></script>
    <script src="search.js"></script>
    <script src="forms.js"></script>

    <!-- Feature modules -->
    <script src="blogs.js"></script>
    <script src="subscribers.js"></script>
    <script src="caseStudies.js"></script>

    <!-- Main entry point -->
    <script src="main.js"></script>

</body>
</html>
